name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Clean & Restructure Project
        run: |
          # The repository is missing Android scaffold. We will generate it.
          echo "Generating brand new Flutter project scaffold..."
          flutter create scaffold_app
          
          # Replace default lib with our lib
          rm -rf scaffold_app/lib
          cp -r lib scaffold_app/lib
          
          # Replace default pubspec with our generated pubspec
          cp pubspec.yaml scaffold_app/pubspec.yaml
          
          # Rename the Android App properly
          sed -i 's/android:label="scaffold_app"/android:label="Hikmah AI"/g' scaffold_app/android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          cd scaffold_app
          flutter pub get

      - name: Patch Android SDK Versions
        run: |
          cd scaffold_app/android/app
          sed -i 's/flutter.minSdkVersion/23/g' build.gradle
          sed -i 's/minSdkVersion 21/minSdkVersion 23/g' build.gradle
          sed -i 's/flutter.compileSdkVersion/34/g' build.gradle
          sed -i 's/compileSdkVersion 33/compileSdkVersion 34/g' build.gradle
          
          cd ../
          # Modern Flutter (Settings.gradle)
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*" apply false/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/g' settings.gradle || true
          # Legacy Flutter (Build.gradle)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" build.gradle || true

      - name: Build APK File
        run: |
          cd scaffold_app
          flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikmah-app-release
          path: scaffold_app/build/app/outputs/flutter-apk/app-release.apk
