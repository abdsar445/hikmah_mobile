name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Clean & Restructure Project
        run: |
          # The repository is missing Android scaffold. We will generate it natively with the exact Firebase namespace
          echo "Generating brand new Flutter project scaffold..."
          flutter create --org com.abdsar445 hikmah_app
          mv hikmah_app scaffold_app
          
          # Replace default lib with our lib
          rm -rf scaffold_app/lib
          cp -r lib scaffold_app/lib
          
          # Replace default pubspec with our generated pubspec
          cp pubspec.yaml scaffold_app/pubspec.yaml
          
          # Replace Android App Icon across all resolutions
          cp app_icon.png scaffold_app/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app_icon.png scaffold_app/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app_icon.png scaffold_app/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app_icon.png scaffold_app/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app_icon.png scaffold_app/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rm -f scaffold_app/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml || true
          
          # Rename the Android App properly
          sed -i 's/android:label="hikmah_app"/android:label="Hikmah AI"/g' scaffold_app/android/app/src/main/AndroidManifest.xml
          
          # Inject Missing Release Internet Permissions
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>' scaffold_app/android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: |
          cd scaffold_app
          flutter pub get

      - name: Install Android command line tools and SDK 35
        run: |
          SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"

          if ! command -v sdkmanager >/dev/null 2>&1; then
            mkdir -p "$SDK_ROOT/cmdline-tools"
            cd /tmp
            curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools.zip
            mkdir -p "$SDK_ROOT/cmdline-tools/latest"
            mv cmdline-tools/* "$SDK_ROOT/cmdline-tools/latest/"
            export PATH="$SDK_ROOT/cmdline-tools/latest/bin:$PATH"
          fi

          yes | sdkmanager --sdk_root="$SDK_ROOT" "platforms;android-35" "build-tools;35.0.2" "platform-tools"

          cd scaffold_app/android/app
          sed -i 's/flutter.minSdkVersion/23/g' build.gradle
          sed -i 's/minSdkVersion 21/minSdkVersion 23/g' build.gradle
          sed -i 's/flutter.compileSdkVersion/35/g' build.gradle
          sed -i 's/compileSdkVersion 33/compileSdkVersion 35/g' build.gradle
          
          cd ../
          # Modern Flutter (Settings.gradle)
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*" apply false/id "org.jetbrains.kotlin.android" version "1.9.22" apply false/g' settings.gradle || true
          # Legacy Flutter (Build.gradle)
          sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" build.gradle || true
          sed -i "s/kotlin_version = '.*'/kotlin_version = '1.9.22'/g" build.gradle || true

      - name: Build APK File
        run: |
          cd scaffold_app
          flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hikmah-app-release
          path: scaffold_app/build/app/outputs/flutter-apk/app-release.apk
